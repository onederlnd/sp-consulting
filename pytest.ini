[pytest]
pythonpath = .
testpaths = tests
addopts =
    --strict-markers
    -v
    --tb=short
filterwarnings =
    ignore::DeprecationWarning
markers =
    auth: authentication and authorization tests
    client: client portal tests
    staff: staff portal tests
    admin: admin area tests
    api: API in/out tests
    analytics: analytics and reporting tests
    slow: tests that hit external services or are otherwise slow